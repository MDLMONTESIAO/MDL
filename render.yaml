services:
  - type: web
    name: acervo-musical-mdl-monte-siao
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status
    envVars:
      - key: DATA_DIR
        value: /var/data/acervo-musical-mdl-monte-siao
    disk:
      name: acervo-monte-siao-data
      mountPath: /var/data/acervo-musical-mdl-monte-siao
      sizeGB: 5
